name: Daily NBA ETL

on:
  workflow_dispatch:
  schedule:
    # Run once per day at 08:00 UTC (adjust as needed)
    - cron: "0 8 * * *"

jobs:
  daily-etl:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e .

      - name: Run daily ETL
        id: etl
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          source .venv/bin/activate
          # stats.nba.com times out from GitHub Actions (data-center IPs). Skip game_logs and team_defense in CI.
          # Run full ETL locally: python -m nba_model.data.daily_etl --strict
          python -m nba_model.data.daily_etl --strict --skip-game-logs --skip-team-defense

      - name: Show ETL failure summary
        if: failure()
        run: |
          echo "=== ETL step failed. Step statuses ==="
          if ls nba_model/data/artifacts/daily_etl_report_*.json 1>/dev/null 2>&1; then
            latest=$(ls -t nba_model/data/artifacts/daily_etl_report_*.json 2>/dev/null | head -1)
            echo "Report: $latest"
            jq -r '.steps | to_entries[] | "  \(.key): \(.value.status)"' "$latest" 2>/dev/null || cat "$latest"
          else
            echo "No ETL report file found (ETL may have failed before writing)."
          fi

      - name: Upload ETL artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-artifacts-${{ github.run_number }}
          path: |
            nba_model/data/artifacts
            nba_model/data/logs
          if-no-files-found: ignore

      - name: Notify on failure (optional Slack/email webhook)
        if: failure()
        env:
          ETL_ALERT_WEBHOOK: ${{ secrets.ETL_ALERT_WEBHOOK }}
        run: |
          if [ -n "$ETL_ALERT_WEBHOOK" ]; then
            payload=$(jq -n \
              --arg status "failed" \
              --arg workflow "$GITHUB_WORKFLOW" \
              --arg job "$GITHUB_JOB" \
              --arg run_id "$GITHUB_RUN_ID" \
              --arg repo "$GITHUB_REPOSITORY" \
              --arg url "https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
              '{text: ("Daily ETL job \($status) for \($repo). Run: \($url)")}')
            curl -X POST -H 'Content-type: application/json' --data "$payload" "$ETL_ALERT_WEBHOOK" || true
          else
            echo "ETL_ALERT_WEBHOOK not set; skipping external alert."
          fi

